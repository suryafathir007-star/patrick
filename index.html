<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Hidden Gate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box" id="loginBox">
  <h2>ENTER CODE</h2>
  <input type="password" id="codeInput" placeholder="••••••">
</div>

<div class="secret-page" id="secretPage">
  <div class="terminal">
    <p id="processText">PROCESSING...</p>
    <p id="typingText"></p>
    <button id="nextBtn" style="display:none;">> CONTINUE</button>
  </div>
  <div class="final-slide" id="finalSlide">
  <div class="final-content">
    <h1 id="finalTitle"></h1>
    <p id="finalText"></p>
  </div>
</div>
</div>

<script src="script.js"></script>
<script src="slide.js"></script>
</body>
</html>
